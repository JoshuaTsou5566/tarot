            return <div className="stars-container">{stars.map(s => <div key={s.id} className="star" style={{ top: s.top, left: s.left, width: s.size, height: s.size, '--duration': s.duration, animationDelay: s.delay }} />)}</div>;
        };

        const TarotCard = ({ card, theme, styles }) => {
            const isChi = theme.startsWith('chiikawa');
            return (
                <div className="flex flex-col items-center gap-3 animate-fade-up">
                    <div className={`relative w-40 h-64 md:w-48 md:h-72 rounded-2xl p-1 glass ${card.isReversed ? 'rotate-180' : ''}`}>
                        <div className={`w-full h-full rounded-xl overflow-hidden flex flex-col ${styles.cardBg} shadow-2xl`}>
                            {isChi ? <img src={CHIIKAWA_IMAGES[card.id]} className="w-full h-full object-cover opacity-90" alt={card.title} /> : (
                                <div className={`flex-1 flex flex-col items-center justify-center space-y-4 ${styles.text}`}>
                                    <div className="text-xs font-serif opacity-40">{card.numeral}</div>
                                    <Icon name="Sparkles" size={40} className={styles.cardIcon} />
                                    <div className={`font-bold tracking-widest`}>{card.title}</div>
                                </div>
                            )}
                            <div className="absolute bottom-0 w-full py-2 bg-black/60 backdrop-blur-md text-center"><span className="text-[10px] text-white/50 tracking-[0.3em] font-bold">ARCANA</span></div>
                        </div>
                    </div>
                    <span className="text-[10px] uppercase font-bold tracking-widest opacity-60">{card.isReversed ? '逆位' : '正位'}</span>
                </div>
            );
        };

        const EncyclopediaItem = ({ card, theme, styles }) => {
            const [isOpen, setIsOpen] = useState(false);
            const isChi = theme.startsWith('chiikawa');
            return (
                <div className={`rounded-[1.5rem] border overflow-hidden transition-all duration-300 ${isOpen ? 'shadow-2xl' : 'hover:scale-[1.01] shadow-md'} ${(isChi || theme === 'day') ? 'bg-white text-slate-800 border-slate-200 shadow-lg' : `${styles.panel} border-white/20 shadow-lg`}`}>
                    <button onClick={() => setIsOpen(!isOpen)} className="w-full p-6 flex items-center gap-6 text-left focus:outline-none">
                        <div className="w-14 h-14 rounded-full glass flex items-center justify-center font-serif opacity-30 text-sm border-2 border-white/10">{card.numeral}</div>
                        <div className="flex-1"><span className="font-bold text-lg tracking-widest block">{card.title}</span><span className="text-xs opacity-40">{card.meaning}</span></div>
                        <Icon name="Chevron" size={20} className={`opacity-20 transition-transform duration-500 ${isOpen ? 'rotate-180' : ''}`} />
                    </button>
                    {isOpen && (
                        <div className="px-6 pb-10 space-y-8 animate-fade-up">
                            <div className="pt-4 border-t border-black/5 space-y-4">
                                <div className="flex flex-wrap gap-2">{card.keywords.map(kw => <span key={kw} className="px-3 py-1 rounded-full bg-indigo-500/10 text-indigo-500 text-[10px] font-bold">#{kw}</span>)}</div>
                                <p className="text-sm opacity-60 italic">「此牌象徵{card.meaning}」</p>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div className="space-y-6">
                                    <h5 className="text-emerald-500 font-bold text-sm">正位解讀</h5>
                                    <div className="space-y-4">{['love', 'work', 'finance', 'social'].map(key => <div key={key} className={`p-5 rounded-2xl border ${(isChi || theme === 'day') ? 'bg-slate-50 border-slate-200' : 'bg-black/20 border-white/10'}`}><div className="text-xs font-bold opacity-40 mb-2">{key.toUpperCase()}</div><p className="text-sm opacity-80">{card[key][0]}</p></div>)}</div>
                                </div>
                                <div className="space-y-6">
                                    <h5 className="text-rose-500 font-bold text-sm">逆位解讀</h5>
                                    <div className="space-y-4">{['love', 'work', 'finance', 'social'].map(key => <div key={key} className={`p-5 rounded-2xl border ${(isChi || theme === 'day') ? 'bg-slate-50 border-slate-200' : 'bg-black/20 border-white/10'}`}><div className="text-xs font-bold opacity-40 mb-2">{key.toUpperCase()}</div><p className="text-sm opacity-80">{card[key][1]}</p></div>)}</div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('divination');
            const [theme, setTheme] = useState('night');
            const [gameState, setGameState] = useState('idle');
            const [spreadType, setSpreadType] = useState('one');
            const [userQuestion, setUserQuestion] = useState('');
            const [selectedCards, setSelectedCards] = useState([]);
            const [aiResponse, setAiResponse] = useState('');
            const [isLoadingAi, setIsLoadingAi] = useState(false);
            const [currentSessionId, setCurrentSessionId] = useState(null);

            const [history, setHistory] = useState(() => {
                const saved = localStorage.getItem('tarot_history');
                return saved ? JSON.parse(saved) : [];
            });

            const [systemMsg, setSystemMsg] = useState(null); 
            const [masterApiKey, setMasterApiKey] = useState(localStorage.getItem('arcanum_master_key') || '');
            const [masterPass, setMasterPass] = useState(localStorage.getItem('arcanum_master_pass') || '');
            const [isUnlocked, setIsUnlocked] = useState(false);
            const [unlockInput, setUnlockInput] = useState('');
            const [isSettingOpen, setIsSettingOpen] = useState(false);
            const [isAdminAuthModalOpen, setIsAdminAuthModalOpen] = useState(false);
            const [adminSecretInput, setAdminSecretInput] = useState('');

            const isChiTheme = theme.startsWith('chiikawa');
            const themeStyles = useMemo(() => {
                const map = {
                    night: { bg: 'bg-[#020617]', text: 'text-slate-100', accent: '#818cf8', panel: 'bg-slate-900/90', btn: 'bg-indigo-600 text-white', input: 'bg-slate-900 text-white shadow-inner', cardBg: 'bg-slate-900', cardIcon: 'text-amber-300 opacity-60' },
                    day: { bg: 'bg-[#fffbeb]', text: 'text-slate-800', accent: '#ea580c', panel: 'bg-white/95', btn: 'bg-slate-900 text-white', input: 'bg-white text-slate-800 border-slate-200 shadow-inner', cardBg: 'bg-white', cardIcon: 'text-amber-500 opacity-80' },
                    'chiikawa-pink': { bg: 'bg-[#FADDE9]', text: 'text-[#D64E8B]', accent: '#D64E8B', panel: 'bg-white/95', btn: 'bg-[#D64E8B] text-white', input: 'bg-white text-slate-800' },
                    'chiikawa-blue': { bg: 'bg-[#D1DCEE]', text: 'text-[#3D5A80]', accent: '#3D5A80', panel: 'bg-white/95', btn: 'bg-[#3D5A80] text-white', input: 'bg-white text-slate-800' },
                    'chiikawa-yellow': { bg: 'bg-[#FEF5BC]', text: 'text-[#96831A]', accent: '#96831A', panel: 'bg-white/95', btn: 'bg-[#96831A] text-white', input: 'bg-white text-slate-800' }
                };
                return map[theme] || map.night;
            }, [theme]);

            const showMsg = (text, type = 'info') => setSystemMsg({ text, type });

            // 格式化複製函式
            const copyContent = (question, cards, interpretation) => {
                const cardText = cards.map(c => `${c.title}(${c.isReversed ? '逆位' : '正位'})`).join('、');
                const content = `【大阿爾克納 - 茶几菩提大師啟示】\n問題：${question}\n牌組：${cardText}\n\n大師啟示：\n${interpretation || "（尚未生成）"}`;
                
                const textArea = document.createElement("textarea");
                textArea.value = content;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    showMsg("啟示已成功複製。", "success");
                } catch (err) {
                    showMsg("複製失敗。", "error");
                }
                document.body.removeChild(textArea);
            };

            const fetchAiInterpretation = async () => {
                const key = masterApiKey || localStorage.getItem('arcanum_master_key');
                const pass = masterPass || localStorage.getItem('arcanum_master_pass');
                if (!key) { showMsg("尚未配置連結金鑰。", "error"); return; }
                if (unlockInput !== pass) { showMsg("密碼不正確。", "error"); return; }
                
                setIsUnlocked(true);
                setIsLoadingAi(true);
                const cardDesc = selectedCards.map(c => `${c.title}(${c.isReversed?'逆位':'正位'})`).join('、');
                
                try {
                    const res = await fetch(`https://api.openai.com/v1/chat/completions`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                        body: JSON.stringify({ 
                            model: "gpt-4o-mini",
                            messages: [
                                { 
                                    role: "system", 
                                    content: "你是一位名為『茶几菩提』的靈性塔羅大師。風格溫暖厚實，但邏輯嚴密，採用麥肯錫式的『金字塔原理』：1.先直接說出結論。2.接著分點進行結構性分析。3.最後給出具體的行動指引。語氣溫柔但一針見血，是那種「為你好才說重話」的智者。" 
                                },
                                { 
                                    role: "user", 
                                    content: `問題：${userQuestion}。抽牌：${cardDesc}。請給予一段結構嚴謹且溫暖的解析，直接提供內容，嚴禁使用 Markdown。` 
                                }
                            ],
                            temperature: 0.7
                        })
                    });
                    const data = await res.json();
                    if (data.error) throw new Error(data.error.message);
                    const resultText = data.choices[0].message.content;
                    setAiResponse(resultText);

                    setHistory(prev => {
                        const updated = prev.map(item => item.id === currentSessionId ? { ...item, interpretation: resultText } : item);
                        localStorage.setItem('tarot_history', JSON.stringify(updated));
                        return updated;
                    });
                } catch (e) {
                    showMsg("連線失敗：" + e.message, "error");
                    setIsUnlocked(false);
                } finally {
                    setIsLoadingAi(false);
                }
            };

            const startDivination = () => {
                if (!userQuestion.trim()) { showMsg("請先輸入您的疑惑。", "error"); return; }
                const sessionId = Date.now();
                setCurrentSessionId(sessionId);
                setGameState('shuffling');
                setIsUnlocked(false);
                setAiResponse('');
                
                setTimeout(() => {
                    const count = spreadType === 'one' ? 1 : 3;
                    const result = [...TAROT_DATA].sort(() => Math.random() - 0.5).slice(0, count).map(c => ({ ...c, isReversed: Math.random() > 0.4 }));
                    setSelectedCards(result);
                    setGameState('revealed');
                    
                    const entry = { id: sessionId, question: userQuestion, cards: result, timestamp: new Date().toLocaleString(), interpretation: null };
                    setHistory(prev => {
                        const updated = [entry, ...prev].slice(0, 5);
                        localStorage.setItem('tarot_history', JSON.stringify(updated));
                        return updated;
                    });
                }, 2000);
            };

            return (
                <div className={`min-h-screen ${themeStyles.bg} ${themeStyles.text} transition-all duration-1000 pb-24 relative overflow-hidden`}>
                    <StarField />
                    {systemMsg && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 modal-overlay no-select">
                            <div className="w-full max-w-sm glass rounded-[3rem] p-10 text-center space-y-6 bg-slate-900/95 text-white shadow-2xl">
                                <Icon name={systemMsg.type === 'error' ? 'X' : 'Sparkles'} size={28} className="mx-auto" />
                                <p className="text-sm opacity-80 leading-relaxed">{systemMsg.text}</p>
                                <button onClick={() => setSystemMsg(null)} className={`w-full py-4 rounded-2xl font-bold ${themeStyles.btn} btn-active shadow-lg`}>確定</button>
                            </div>
                        </div>
                    )}
                    {isAdminAuthModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 modal-overlay no-select">
                            <div className="w-full max-w-sm glass rounded-[3rem] p-10 text-center space-y-8 bg-slate-900 text-white shadow-2xl">
                                <Icon name="Shield" size={40} className="mx-auto text-amber-400" />
                                <input type="password" value={adminSecretInput} onChange={e => setAdminSecretInput(e.target.value)} placeholder="驗證密碼" className="w-full bg-white/5 border border-white/10 rounded-2xl px-4 py-5 text-center focus:outline-none" onKeyDown={e => e.key === 'Enter' && (btoa(adminSecretInput) === "NTU2Ng==" ? (setIsAdminAuthModalOpen(false), setIsSettingOpen(true)) : showMsg("密碼錯誤", "error"))}/>
                                <div className="flex gap-3"><button onClick={() => setIsAdminAuthModalOpen(false)} className="flex-1 py-4 opacity-40">取消</button><button onClick={() => btoa(adminSecretInput) === "NTU2Ng==" ? (setIsAdminAuthModalOpen(false), setIsSettingOpen(true)) : showMsg("密碼錯誤", "error")} className={`flex-1 py-4 rounded-2xl font-bold ${themeStyles.btn} btn-active`}>進入</button></div>
                            </div>
                        </div>
                    )}
                    <header className="max-w-4xl mx-auto px-6 py-8 flex justify-between items-center relative z-20">
                        <div className="flex items-center gap-3 cursor-pointer no-select" onClick={() => setGameState('idle')}>
                            <div className="p-2.5 rounded-2xl glass bg-white/10"><Icon name={isChiTheme ? "ChiikawaHead" : "Sparkles"} size={26} className={isChiTheme ? "text-white" : "text-amber-300"} /></div>
                            <h1 className="text-xl md:text-2xl font-serif font-bold tracking-widest">{isChiTheme ? "大阿爾克納 & Chiikawa" : "大阿爾克納"}</h1>
                        </div>
                        <button onClick={() => setTheme(isChiTheme ? 'night' : (theme === 'night' ? 'day' : 'chiikawa-pink'))} className="w-12 h-12 rounded-full glass bg-white/5 flex items-center justify-center btn-active">
                            <Icon name={theme === 'night' ? "Moon" : (theme === 'day' ? "Sun" : "ChiikawaHead")} size={18} />
                        </button>
                    </header>
                    <main className="max-w-4xl mx-auto px-6 relative z-10">
                        {activeTab === 'divination' && (
                            <div className="space-y-12">
                                {gameState === 'idle' && (
                                    <div className="animate-fade-up flex flex-col items-center text-center space-y-10 py-12">
                                        <h2 className="text-3xl md:text-4xl font-serif font-bold italic leading-tight">「閉上雙眼，深呼吸，<br/>讓您的困惑在此浮現。」</h2>
                                        <textarea value={userQuestion} onChange={e => setUserQuestion(e.target.value)} placeholder="在此輸入您想問的事情..." className={`w-full max-w-2xl h-40 border-2 rounded-[2rem] p-8 focus:outline-none transition-all text-lg resize-none shadow-xl ${themeStyles.input}`} />
                                        <div className="flex gap-4 w-full max-w-md no-select">
                                            <button onClick={() => setSpreadType('one')} className={`flex-1 py-4 rounded-2xl glass border-2 transition-all ${spreadType === 'one' ? 'border-amber-400/60 bg-amber-400/10' : 'border-transparent opacity-40'}`}>一牌直覺</button>
                                            <button onClick={() => setSpreadType('three')} className={`flex-1 py-4 rounded-2xl glass border-2 transition-all ${spreadType === 'three' ? 'border-amber-400/60 bg-amber-400/10' : 'border-transparent opacity-40'}`}>聖三角</button>
                                        </div>
                                        <button onClick={startDivination} className={`px-12 py-5 ${themeStyles.btn} rounded-full font-bold tracking-[0.5em] shadow-2xl uppercase btn-active`}>啟動靈性感應</button>
                                    </div>
                                )}
                                {gameState === 'shuffling' && <div className="flex flex-col items-center py-32 animate-pulse no-select"><div className="w-40 h-60 glass bg-slate-800 rounded-2xl card-shuffle border-2 border-white/10" /><p className="text-xl font-serif italic tracking-[0.3em] mt-10 opacity-60">正在搜尋命運軌跡...</p></div>}
                                {gameState === 'revealed' && (
                                    <div className="space-y-16 animate-fade-up pb-12">
                                        <div className="flex flex-wrap justify-center gap-6 md:gap-12">{selectedCards.map((c, i) => <TarotCard key={i} card={c} theme={theme} styles={themeStyles} />)}</div>
                                        <div className={`rounded-[3rem] p-8 md:p-14 space-y-8 shadow-2xl border ${(isChiTheme || theme === 'day') ? 'bg-white border-slate-200 text-slate-800' : 'bg-slate-900 border-white/10 text-white'}`}>
                                            <div className="flex justify-between items-center border-b border-black/5 pb-4">
                                                <div className="flex items-center gap-2 opacity-50 text-xs font-bold uppercase italic"><Icon name="Sparkles" size={14} /> 宇宙的深度啟示</div>
                                                {isUnlocked && aiResponse && !isLoadingAi && (
                                                    <button onClick={() => copyContent(userQuestion, selectedCards, aiResponse)} className="flex items-center gap-1.5 text-[10px] font-bold uppercase tracking-widest opacity-40 hover:opacity-100 transition-all btn-active">
                                                        <Icon name="Copy" size={14} /> 複製啟示
                                                    </button>
                                                )}
                                            </div>
                                            {!isUnlocked ? (
                                                <div className="flex flex-col items-center py-10 space-y-8">
                                                    <Icon name="Lock" size={48} className="opacity-20 animate-pulse" />
                                                    <input type="text" value={unlockInput} onChange={e => setUnlockInput(e.target.value)} placeholder="輸入訪問密碼" className={`w-full max-w-xs border rounded-2xl px-4 py-5 text-center focus:outline-none bg-black/5 ${themeStyles.input}`} />
                                                    <button onClick={fetchAiInterpretation} disabled={isLoadingAi} className={`w-full max-w-xs py-5 ${themeStyles.btn} rounded-2xl font-bold uppercase btn-active`}>感應大師訊息</button>
                                                </div>
                                            ) : (
                                                <div className="min-h-[200px] leading-relaxed text-lg italic opacity-90 animate-fade-up whitespace-pre-wrap">{isLoadingAi ? <div className="flex items-center gap-3"><Icon name="Refresh" size={20} className="animate-spin" /> 大師正在斟茶、感應中...</div> : aiResponse}</div>
                                            )}
                                        </div>
                                        <button onClick={() => setGameState('idle')} className={`w-full py-6 rounded-full font-bold uppercase tracking-[0.4em] ${themeStyles.btn} btn-active shadow-2xl`}>重新啟動占卜</button>
                                    </div>
                                )}
                            </div>
                        )}
                        {activeTab === 'history' && (
                            <div className="animate-fade-up space-y-8 py-10 pb-20">
                                <h2 className="text-3xl font-serif font-bold tracking-widest">歷史感應紀錄</h2>
                                {history.length === 0 ? <div className="py-32 text-center opacity-20 italic">尚未記錄任何靈魂足跡</div> : (
                                    <div className="space-y-6">{history.map(h => (
                                        <div key={h.id} className={`rounded-[2rem] p-8 flex flex-col gap-6 border border-white/5 ${(isChiTheme || theme === 'day') ? 'bg-white text-slate-800' : 'bg-slate-900 shadow-xl'}`}>
                                            <div className="flex flex-col md:flex-row justify-between items-start gap-4">
                                                <div className="flex-1 space-y-2">
                                                    <div className="flex items-center justify-between">
                                                        <div className="text-[10px] opacity-30 uppercase font-mono">{h.timestamp}</div>
                                                        <button onClick={() => copyContent(h.question, h.cards, h.interpretation)} className="flex items-center gap-1.5 text-[10px] font-bold uppercase tracking-widest opacity-40 hover:opacity-100 transition-all btn-active">
                                                            <Icon name="Copy" size={14} /> 複製啟示
                                                        </button>
                                                    </div>
                                                    <div className="font-bold text-lg">問：{h.question}</div>
                                                </div>
                                                <div className="flex gap-2 flex-wrap">{h.cards.map((c, i) => <div key={i} className="px-3 py-1 rounded-lg text-[10px] border border-white/10 opacity-60">{c.title} {c.isReversed ? '↓' : '↑'}</div>)}</div>
                                            </div>
                                            {h.interpretation && (
                                                <div className="p-6 rounded-2xl bg-black/10 border-l-4 border-indigo-500 text-sm italic opacity-80 leading-relaxed whitespace-pre-wrap transition-all">
                                                    <div className="text-[10px] font-bold uppercase tracking-widest mb-2 text-indigo-400">茶几菩提大師的啟示</div>
                                                    {h.interpretation}
                                                </div>
                                            )}
                                        </div>
                                    ))}</div>
                                )}
                            </div>
                        )}
                        {activeTab === 'guide' && (
                            <div className="animate-fade-up space-y-10 py-10 pb-20">
                                <h3 className="text-2xl font-serif font-bold border-l-4 border-amber-400 pl-4 tracking-widest">阿爾克納百科</h3>
                                <div className="grid grid-cols-1 gap-5">{TAROT_DATA.map(c => <EncyclopediaItem key={c.id} card={c} theme={theme} styles={themeStyles} />)}</div>
                                <div className="pt-16 border-t border-white/5 space-y-6">
                                    <h3 className="text-xl font-serif font-bold opacity-50 uppercase tracking-widest">宇宙觀測日誌</h3>
                                    <div className="space-y-4">{UPDATE_LOGS.map((log, i) => <div key={i} className={`p-6 rounded-[1.5rem] border border-white/10 ${(isChiTheme || theme === 'day') ? 'bg-white shadow-sm' : 'bg-slate-900 shadow-xl'}`}><h4 className="font-bold tracking-widest">{log.title}</h4><p className="text-xs opacity-60 mt-2 leading-relaxed">{log.desc}</p></div>)}</div>
                                    <button onClick={() => setIsAdminAuthModalOpen(true)} className="w-full py-4 glass rounded-[1.5rem] text-[11px] font-bold opacity-30 hover:opacity-100 uppercase tracking-widest transition-all">管理員進階設定</button>
                                    {isSettingOpen && (
                                        <div className={`p-8 rounded-[2.5rem] space-y-10 animate-fade-up border border-white/20 ${(isChiTheme || theme === 'day') ? 'bg-slate-50 text-slate-800' : 'bg-slate-900'}`}>
                                            <div className="space-y-6 text-center">
                                                <p className="text-sm font-bold tracking-widest uppercase">系統核心設定</p>
                                                <div className="space-y-3">
                                                    <input type="password" placeholder="宇宙連結金鑰 (sk-...)" value={masterApiKey} onChange={e => setMasterApiKey(e.target.value)} className={`w-full border rounded-2xl px-4 py-5 text-center focus:outline-none transition-all text-sm ${isChiTheme ? 'bg-white border-slate-200 text-slate-900' : 'bg-black/20 border-white/10 text-white'}`} />
                                                    <input type="text" placeholder="設定訪問密碼" value={masterPass} onChange={e => setMasterPass(e.target.value)} className={`w-full border rounded-2xl px-4 py-5 text-center focus:outline-none transition-all text-sm ${isChiTheme ? 'bg-white border-slate-200 text-slate-900' : 'bg-black/20 border-white/10 text-white'}`} />
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => {localStorage.setItem('arcanum_master_key', masterApiKey); localStorage.setItem('arcanum_master_pass', masterPass); showMsg("儲存成功", "success")}} className="flex-1 py-5 bg-indigo-600 text-white rounded-2xl font-bold uppercase btn-active shadow-xl">儲存設定</button>
                                                    <button onClick={() => {localStorage.removeItem('tarot_history'); setHistory([]); showMsg("歷史紀錄已徹底清空。", "success")}} className="px-6 py-5 bg-rose-600/20 text-rose-500 rounded-2xl font-bold text-xs btn-active transition-all">清空紀錄</button>
                                                </div>
                                                <button onClick={() => setIsSettingOpen(false)} className="text-[10px] opacity-30 uppercase font-bold tracking-widest hover:opacity-100 transition-all">關閉設定</button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>
                    <nav className="fixed bottom-0 left-0 w-full glass border-t border-white/10 py-6 px-10 flex justify-around items-center z-50 transition-all">
                        {[{ id: 'divination', label: '占卜', icon: 'Sparkles' }, { id: 'history', label: '紀錄', icon: 'History' }, { id: 'guide', label: '百科', icon: 'Book' }].map(tab => (
                            <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex flex-col items-center gap-1.5 transition-all ${activeTab === tab.id ? 'opacity-100 scale-110' : 'opacity-25'}`} style={{ color: activeTab === tab.id ? themeStyles.accent : 'currentColor' }}><Icon name={tab.icon} size={26} /><span className="text-[11px] font-bold uppercase tracking-widest">{tab.label}</span></button>
                        ))}
                    </nav>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
