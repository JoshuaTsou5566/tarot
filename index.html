<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大阿爾克納 - 靈性指引</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; margin: 0; padding: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; background-color: #020617; transition: background-color 0.8s ease; }
        .font-serif { font-family: 'Noto Serif TC', serif; }
        ::-webkit-scrollbar { display: none; }
        .animate-fade-up { animation: fadeUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; opacity: 0; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .card-shuffle { animation: shuffleEffect 0.7s infinite alternate ease-in-out; }
        @keyframes shuffleEffect { 0% { transform: translate(0, 0) rotate(0deg) scale(1); } 100% { transform: translate(10px, -15px) rotate(5deg) scale(1.05); } }
        .glass { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .no-select { user-select: none; -webkit-user-select: none; }
        .stars-container { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.1; animation: twinkle var(--duration) infinite ease-in-out; }
        @keyframes twinkle { 0%, 100% { opacity: 0.1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.3); } }
        .btn-active:active { transform: scale(0.95); transition: 0.1s; }
        .modal-overlay { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const ICONS = {
            Sparkles: <><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4M19 17v4M3 5h4M17 19h4"/></>,
            History: <><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></>,
            Book: <><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-0.5-5"/><path d="M6.5 17H20"/></>,
            Moon: <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>,
            Sun: <><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></>,
            Lock: <><rect width="18" height="11" x="3" y="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></>,
            Refresh: <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8M21 3v5h-5M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16M3 21v-5h5"/>,
            Chevron: <polyline points="6 9 12 15 18 9" />,
            X: <><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></>,
            Shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>,
            Copy: <><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></>,
            Share: <><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></>,
            ChiikawaHead: <path d="M12 22C6.5 22 2 17.5 2 12C2 8.5 4.5 5.5 8 4.5V2A1.5 1.5 0 0 1 11 2v2c.3-.1.6-.1.9-.1s.7 0 1 .1V2a1.5 1.5 0 0 1 3 0v2.5c3.5 1 6 4 6 7.5 0 5.5-4.5 10-10 10z" fill="currentColor" />
        };

        const TAROT_DATA = [
            { id: 0, numeral: "0", title: "愚者", meaning: "純真與開端", love: ["新開端", "魯莽"], social: ["交新朋友", "不靠譜"], work: ["轉職創意", "缺乏計畫"], finance: ["意外開銷", "不穩定"] },
            { id: 1, numeral: "I", title: "魔術師", meaning: "創造力", love: ["吸力開端", "虛偽"], social: ["核心才華", "油腔滑調"], work: ["掌握資源", "能力不足"], finance: ["創造財富", "投資陷阱"] },
            { id: 2, numeral: "II", title: "女祭司", meaning: "直覺智慧", love: ["靈魂契合", "壓抑"], social: ["明智傾聽", "孤僻"], work: ["正確決策", "忽視細節"], finance: ["保守理財", "隱藏虧損"] },
            { id: 3, numeral: "III", title: "皇后", meaning: "豐盛與美", love: ["甜蜜豐收", "依賴"], social: ["和諧關懷", "嘮叨"], work: ["創意泉湧", "停滯"], finance: ["財運極佳", "揮霍"] },
            { id: 4, numeral: "IV", title: "皇帝", meaning: "權威秩序", love: ["穩定安全", "專制"], social: ["領導景仰", "僵化"], work: ["系統根基", "束縛"], finance: ["穩定收入", "損失"] },
            { id: 5, numeral: "V", title: "教皇", meaning: "傳統指引", love: ["重視承諾", "分歧"], social: ["尋求導師", "保守"], work: ["遵循流程", "排斥創新"], finance: ["穩健信譽", "糾紛"] },
            { id: 6, numeral: "VI", title: "戀人", meaning: "選擇契合", love: ["完美和諧", "誘惑"], social: ["深厚友誼", "衝突"], work: ["合夥協作", "嫌隙"], finance: ["正確決策", "不智"] },
            { id: 7, numeral: "VII", title: "戰車", meaning: "意志勝利", love: ["克服障礙", "失控"], social: ["魅力前進", "反感"], work: ["重大突破", "迷失"], finance: ["開源增長", "負債"] },
            { id: 8, numeral: "VIII", title: "力量", meaning: "勇氣韌性", love: ["以柔克剛", "無力"], social: ["強大親和", "疲憊"], work: ["化解危機", "軟弱"], finance: ["良好自制", "失控"] },
            { id: 9, numeral: "IX", title: "隱者", meaning: "內省智慧", love: ["靈魂對話", "隔閡"], social: ["淡泊成長", "邊緣"], work: ["深耕領域", "遲緩"], finance: ["淡欲理財", "小氣"] },
            { id: 10, numeral: "X", title: "命運之輪", meaning: "週期轉機", love: ["命運安排", "低潮"], social: ["新友人脈", "無常"], work: ["掌握晉升", "阻礙"], finance: ["意外中獎", "虧損"] },
            { id: 11, numeral: "XI", title: "正義", meaning: "公平責任", love: ["誠實對待", "冷戰"], social: ["公正調解", "偏見"], work: ["應有回饋", "承擔"], finance: ["清晰帳目", "官司"] },
            { id: 12, numeral: "XII", title: "倒吊人", meaning: "犧牲視角", love: ["等待昇華", "徒勞"], social: ["成就大局", "利用"], work: ["蓄積能量", "停滯"], finance: ["保持耐心", "凍結"] },
            { id: 13, numeral: "XIII", title: "死神", meaning: "終結重生", love: ["迎接全新", "拒絕"], social: ["重新審視", "陰影"], work: ["重大轉機", "不安"], finance: ["结清舊帳", "崩潰"] },
            { id: 14, numeral: "XIV", title: "節制", meaning: "平衡調和", love: ["溫和長久", "失靈"], social: ["資源整合", "不入"], work: ["穩定成長", "浪費"], finance: ["財富累積", "混亂"] },
            { id: 15, numeral: "XV", title: "惡魔", meaning: "慾望束縛", love: ["強烈吸引", "制約"], social: ["沈溺玩樂", "虛偽"], work: ["權力執念", "釋放"], finance: ["意外橫財", "泥沼"] },
            { id: 16, numeral: "XVI", title: "塔", meaning: "劇變啟示", love: ["劇烈衝擊", "裂痕"], social: ["關係崩解", "衰敗"], work: ["廢墟重起", "危機"], finance: ["突發破產", "末路"] },
            { id: 17, numeral: "XVII", title: "星星", meaning: "希望療癒", love: ["憧憬治癒", "破裂"], social: ["吸引同道", "孤傲"], work: ["長遠靈感", "空談"], finance: ["平順希望", "遙遠"] },
            { id: 18, numeral: "XVIII", title: "月亮", meaning: "不安焦慮", love: ["情感模糊", "真相"], social: ["人際猜忌", "焦慮"], work: ["隱藏陷阱", "解決"], finance: ["不宜投資", "漏洞"] },
            { id: 19, numeral: "XIX", title: "太陽", meaning: "光明成功", love: ["關係活力", "壓抑"], social: ["燦爛受寵", "疲累"], work: ["顯著成就", "倦怠"], finance: ["旺盛穩定", "吃緊"] },
            { id: 20, numeral: "XX", title: "復活再生", love: ["破鏡重圓", "重蹈"], social: ["改善關係", "輿論"], work: ["事業新生", "錯失"], finance: ["獲得果實", "審計"] },
            { id: 21, numeral: "XXI", title: "世界", meaning: "圓滿整合", love: ["完美境地", "未竟"], social: ["廣闊人脈", "空虛"], work: ["業界聲譽", "拖延"], finance: ["財務自由", "瓶頸"] }
        ];

        const CHIIKAWA_IMAGES = Array.from({length: 22}).reduce((acc, _, i) => {
            acc[i] = `https://raw.githubusercontent.com/JoshuaTsou5566/tarot/refs/heads/main/${i}.jpg`;
            return acc;
        }, {});

        const Icon = ({ name, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {ICONS[name]}
            </svg>
        );

        const StarField = () => {
            const stars = useMemo(() => Array.from({length: 30}).map((_, i) => ({
                id: i, top: `${Math.random() * 100}%`, left: `${Math.random() * 100}%`,
                size: `${Math.random() * 2 + 1}px`, duration: `${Math.random() * 3 + 2}s`, delay: `${Math.random() * 5}s`
            })), []);
            return <div className="stars-container">{stars.map(s => <div key={s.id} className="star" style={{ top: s.top, left: s.left, width: s.size, height: s.size, '--duration': s.duration, animationDelay: s.delay }} />)}</div>;
        };

        const TarotCard = ({ card, theme, styles }) => {
            const isChi = theme.startsWith('chiikawa');
            return (
                <div className="flex flex-col items-center gap-3 animate-fade-up">
                    <div className={`relative w-36 h-56 md:w-44 md:h-64 rounded-2xl p-1 glass ${card.isReversed ? 'rotate-180' : ''}`}>
                        <div className={`w-full h-full rounded-xl overflow-hidden flex flex-col ${styles.cardBg} shadow-2xl`}>
                            {isChi ? <img src={CHIIKAWA_IMAGES[card.id]} className="w-full h-full object-cover opacity-90" alt={card.title} /> : (
                                <div className={`flex-1 flex flex-col items-center justify-center space-y-4 ${styles.text}`}>
                                    <div className="text-xs font-serif opacity-30">{card.numeral}</div>
                                    <Icon name="Sparkles" size={32} className={styles.cardIcon} />
                                    <div className="font-bold tracking-widest">{card.title}</div>
                                </div>
                            )}
                            <div className="absolute bottom-0 w-full py-2 bg-black/60 backdrop-blur-md text-center"><span className="text-[9px] text-white/40 tracking-[0.3em] font-bold">ARCANA</span></div>
                        </div>
                    </div>
                    <span className="text-[10px] font-bold opacity-60 uppercase">{card.isReversed ? '逆位' : '正位'}</span>
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('divination');
            const [theme, setTheme] = useState('night');
            const [gameState, setGameState] = useState('idle');
            const [spreadType, setSpreadType] = useState('one');
            const [userQuestion, setUserQuestion] = useState('');
            const [selectedCards, setSelectedCards] = useState([]);
            const [aiResponse, setAiResponse] = useState('');
            const [isLoadingAi, setIsLoadingAi] = useState(false);
            const [currentSessionId, setCurrentSessionId] = useState(null);
            const [systemMsg, setSystemMsg] = useState(null); 

            const [history, setHistory] = useState(() => {
                try {
                    const saved = localStorage.getItem('tarot_history');
                    return saved ? JSON.parse(saved) : [];
                } catch(e) { return []; }
            });

            const [masterApiKey, setMasterApiKey] = useState(localStorage.getItem('arcanum_master_key') || '');
            const [masterPass, setMasterPass] = useState(localStorage.getItem('arcanum_master_pass') || '5566');
            const [unlockInput, setUnlockInput] = useState('');
            const [isUnlocked, setIsUnlocked] = useState(false);
            const [isAdminOpen, setAdminOpen] = useState(false);
            const [adminPassInput, setAdminPassInput] = useState('');

            const isChiTheme = theme.startsWith('chiikawa');
            const themeStyles = useMemo(() => {
                const map = {
                    night: { bg: 'bg-[#020617]', text: 'text-slate-100', accent: '#818cf8', panel: 'bg-slate-900/90', btn: 'bg-indigo-600', input: 'bg-slate-900 text-white', cardBg: 'bg-slate-900', cardIcon: 'text-amber-300' },
                    day: { bg: 'bg-[#fffbeb]', text: 'text-slate-800', accent: '#ea580c', panel: 'bg-white/95', btn: 'bg-slate-900 text-white', input: 'bg-white border-slate-200', cardBg: 'bg-white', cardIcon: 'text-amber-500' },
                    'chiikawa-pink': { bg: 'bg-[#FADDE9]', text: 'text-[#D64E8B]', accent: '#D64E8B', panel: 'bg-white/95', btn: 'bg-[#D64E8B] text-white', input: 'bg-white' }
                };
                return map[theme] || map.night;
            }, [theme]);

            const showMsg = (text, type = 'info') => setSystemMsg({ text, type });

            // 處理授權連結
            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const auth = urlParams.get('auth');
                if (auth) {
                    try {
                        const decoded = decodeURIComponent(atob(auth)).split('|');
                        if (decoded.length === 2) {
                            localStorage.setItem('arcanum_master_key', decoded[0]);
                            localStorage.setItem('arcanum_master_pass', decoded[1]);
                            setMasterApiKey(decoded[0]); setMasterPass(decoded[1]);
                            window.history.replaceState({}, '', window.location.pathname);
                            showMsg("核心連結同步成功！茶几菩提大師已就緒。", "success");
                        }
                    } catch(e) {}
                }
            }, []);

            const copyToClipboard = (q, cards, interp) => {
                const cardStr = cards.map(c => `${c.title}(${c.isReversed ? '逆位' : '正位'})`).join('、');
                const content = `【大阿爾克納 - 茶几菩提大師啟示】\n問題：${q}\n牌組：${cardStr}\n\n大師啟示：\n${interp || "（生成中）"}`;
                const el = document.createElement("textarea"); el.value = content; document.body.appendChild(el); el.select();
                try { document.execCommand('copy'); showMsg("啟示已成功複製。", "success"); } catch(e) { showMsg("複製失敗。", "error"); }
                document.body.removeChild(el);
            };

            const fetchAiInterpretation = async () => {
                if (!masterApiKey) { showMsg("尚未配置連結。請利用授權連結進入。", "error"); return; }
                if (unlockInput !== masterPass) { showMsg("訪問密碼錯誤。", "error"); return; }
                setIsUnlocked(true); setIsLoadingAi(true);
                const cardDesc = selectedCards.map(c => `${c.title}(${c.isReversed?'逆位':'正位'})`).join('、');
                try {
                    const res = await fetch(`https://api.openai.com/v1/chat/completions`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${masterApiKey}` },
                        body: JSON.stringify({ 
                            model: "gpt-4o-mini",
                            messages: [
                                { role: "system", content: "你是一位名為『茶几菩提』的塔羅大師。請使用『麥肯錫金字塔架構』：1.先直接說結論。2.接著分段落進行結構化分析。3.最後給出具體行動指引。風格溫暖且犀利，請確保分段明確。" },
                                { role: "user", content: `問題：${userQuestion}。牌組：${cardDesc}。解析約300字，嚴禁Markdown符號。` }
                            ],
                            temperature: 0.7
                        })
                    });
                    const data = await res.json();
                    if (data.error) throw new Error(data.error.message);
                    const result = data.choices[0].message.content;
                    setAiResponse(result);
                    setHistory(prev => {
                        const updated = prev.map(item => item.id === currentSessionId ? { ...item, interpretation: result } : item);
                        localStorage.setItem('tarot_history', JSON.stringify(updated));
                        return updated;
                    });
                } catch (e) { showMsg("宇宙連結中斷：" + e.message, "error"); setIsUnlocked(false); } finally { setIsLoadingAi(false); }
            };

            const startDivination = () => {
                if (!userQuestion.trim()) { showMsg("請先告訴宇宙您的疑惑。", "error"); return; }
                const sessionId = Date.now(); setCurrentSessionId(sessionId);
                setGameState('shuffling'); setIsUnlocked(false); setAiResponse('');
                setTimeout(() => {
                    const count = spreadType === 'one' ? 1 : 3;
                    const result = [...TAROT_DATA].sort(() => Math.random() - 0.5).slice(0, count).map(c => ({ ...c, isReversed: Math.random() > 0.4 }));
                    setSelectedCards(result); setGameState('revealed');
                    setHistory(prev => {
                        const updated = [{ id: sessionId, question: userQuestion, cards: result, timestamp: new Date().toLocaleString(), interpretation: null }, ...prev].slice(0, 10);
                        localStorage.setItem('tarot_history', JSON.stringify(updated));
                        return updated;
                    });
                }, 2000);
            };

            return (
                <div className={`min-h-screen ${themeStyles.bg} ${themeStyles.text} transition-all duration-1000 pb-24 relative overflow-hidden`}>
                    <StarField />
                    {systemMsg && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 modal-overlay no-select">
                            <div className="w-full max-w-sm glass rounded-[3rem] p-10 text-center space-y-6 bg-slate-900/95 text-white shadow-2xl">
                                <Icon name={systemMsg.type === 'error' ? 'X' : 'Sparkles'} size={28} className="mx-auto" />
                                <p className="text-sm opacity-80 leading-relaxed">{systemMsg.text}</p>
                                <button onClick={() => setSystemMsg(null)} className={`w-full py-4 rounded-2xl font-bold ${themeStyles.btn} btn-active shadow-lg`}>確定</button>
                            </div>
                        </div>
                    )}
                    <header className="max-w-4xl mx-auto px-6 py-8 flex justify-between items-center relative z-20">
                        <div className="flex items-center gap-3 cursor-pointer no-select" onClick={() => setGameState('idle')}>
                            <div className="p-2.5 rounded-2xl glass bg-white/10"><Icon name={isChiTheme ? "ChiikawaHead" : "Sparkles"} size={26} className={isChiTheme ? "text-white" : "text-amber-300"} /></div>
                            <h1 className="text-xl md:text-2xl font-serif font-bold tracking-widest">{isChiTheme ? "大阿爾克納 & Chiikawa" : "大阿爾克納"}</h1>
                        </div>
                        <button onClick={() => setTheme(isChiTheme ? 'night' : (theme === 'night' ? 'day' : 'chiikawa-pink'))} className="w-12 h-12 rounded-full glass bg-white/5 flex items-center justify-center">
                            <Icon name={theme === 'night' ? "Moon" : (theme === 'day' ? "Sun" : "ChiikawaHead")} size={18} />
                        </button>
                    </header>
                    <main className="max-w-4xl mx-auto px-6 relative z-10">
                        {activeTab === 'divination' && (
                            <div className="space-y-12">
                                {gameState === 'idle' && (
                                    <div className="animate-fade-up flex flex-col items-center text-center space-y-10 py-12">
                                        <h2 className="text-3xl md:text-4xl font-serif font-bold italic leading-tight">「閉上雙眼，深呼吸，<br/>讓您的困惑在此浮現。」</h2>
                                        <textarea value={userQuestion} onChange={e => setUserQuestion(e.target.value)} placeholder="在此輸入您想問的事情..." className={`w-full max-w-2xl h-40 border-2 rounded-[2rem] p-8 focus:outline-none transition-all text-lg resize-none shadow-xl ${themeStyles.input}`} />
                                        <div className="flex gap-4 w-full max-w-md no-select">
                                            <button onClick={() => setSpreadType('one')} className={`flex-1 py-4 rounded-2xl glass border-2 transition-all ${spreadType === 'one' ? 'border-amber-400/60 bg-amber-400/10' : 'border-transparent opacity-40'}`}>一牌直覺</button>
                                            <button onClick={() => setSpreadType('three')} className={`flex-1 py-4 rounded-2xl glass border-2 transition-all ${spreadType === 'three' ? 'border-amber-400/60 bg-amber-400/10' : 'border-transparent opacity-40'}`}>聖三角</button>
                                        </div>
                                        <button onClick={startDivination} className={`px-12 py-5 ${themeStyles.btn} rounded-full font-bold tracking-[0.5em] shadow-2xl uppercase btn-active`}>啟動靈性感應</button>
                                    </div>
                                )}
                                {gameState === 'shuffling' && <div className="flex flex-col items-center py-32 animate-pulse no-select"><div className="w-40 h-60 glass bg-slate-800 rounded-2xl card-shuffle border-2 border-white/10" /><p className="text-xl font-serif italic tracking-[0.3em] mt-10 opacity-60">正在搜尋命運軌跡...</p></div>}
                                {gameState === 'revealed' && (
                                    <div className="space-y-16 animate-fade-up pb-12">
                                        <div className="flex flex-wrap justify-center gap-6 md:gap-12">{selectedCards.map((c, i) => <TarotCard key={i} card={c} theme={theme} styles={themeStyles} />)}</div>
                                        <div className={`rounded-[3rem] p-8 md:p-14 space-y-8 shadow-2xl border ${(isChiTheme || theme === 'day') ? 'bg-white border-slate-200 text-slate-800' : 'bg-slate-900 border-white/10 text-white'}`}>
                                            <div className="flex justify-between items-center border-b border-black/5 pb-4">
                                                <div className="flex items-center gap-2 opacity-50 text-xs font-bold uppercase italic"><Icon name="Sparkles" size={14} /> 宇宙的深度啟示</div>
                                                {isUnlocked && aiResponse && !isLoadingAi && (
                                                    <button onClick={() => copyToClipboard(userQuestion, selectedCards, aiResponse)} className="flex items-center gap-1.5 text-[10px] font-bold uppercase opacity-40 hover:opacity-100 transition-all btn-active"><Icon name="Copy" size={14} /> 複製啟示</button>
                                                )}
                                            </div>
                                            {!isUnlocked ? (
                                                <div className="flex flex-col items-center py-10 space-y-8">
                                                    <Icon name="Lock" size={48} className="opacity-20 animate-pulse" />
                                                    <input type="text" value={unlockInput} onChange={e => setUnlockInput(e.target.value)} placeholder="訪問密碼" className={`w-full max-w-xs border rounded-2xl px-4 py-5 text-center ${themeStyles.input}`} />
                                                    <button onClick={fetchAiInterpretation} disabled={isLoadingAi} className={`w-full max-w-xs py-5 ${themeStyles.btn} rounded-2xl font-bold uppercase`}>感應大師訊息</button>
                                                </div>
                                            ) : (
                                                <div className="min-h-[200px] leading-relaxed text-lg italic opacity-90 animate-fade-up whitespace-pre-wrap">{isLoadingAi ? "大師正在感應中..." : aiResponse}</div>
                                            )}
                                        </div>
                                        <button onClick={() => setGameState('idle')} className={`w-full py-6 rounded-full font-bold uppercase tracking-[0.4em] ${themeStyles.btn} btn-active shadow-2xl`}>重新啟動占卜</button>
                                    </div>
                                )}
                            </div>
                        )}
                        {activeTab === 'history' && (
                            <div className="animate-fade-up space-y-8 py-10 pb-20">
                                <h2 className="text-3xl font-serif font-bold tracking-widest">歷史感應紀錄</h2>
                                {history.length === 0 ? <div className="py-32 text-center opacity-20 italic">尚未記錄任何靈魂足跡</div> : (
                                    <div className="space-y-6">{history.map(h => (
                                        <div key={h.id} className={`rounded-[2rem] p-8 flex flex-col gap-6 border border-white/5 ${(isChiTheme || theme === 'day') ? 'bg-white text-slate-800' : 'bg-slate-900 shadow-xl'}`}>
                                            <div className="flex flex-col md:flex-row justify-between items-start gap-4">
                                                <div className="flex-1 space-y-2">
                                                    <div className="flex items-center justify-between">
                                                        <div className="text-[10px] opacity-30 uppercase font-mono">{h.timestamp}</div>
                                                        <button onClick={() => copyToClipboard(h.question, h.cards, h.interpretation)} className="flex items-center gap-1.5 text-[10px] font-bold uppercase opacity-40 hover:opacity-100 btn-active"><Icon name="Copy" size={14} /> 複製紀錄</button>
                                                    </div>
                                                    <div className="font-bold text-lg">問：{h.question}</div>
                                                </div>
                                                <div className="flex gap-2 flex-wrap">{h.cards.map((c, i) => <div key={i} className="px-3 py-1 rounded-lg text-[10px] border border-white/10 opacity-60">{c.title} {c.isReversed ? '↓' : '↑'}</div>)}</div>
                                            </div>
                                            {h.interpretation && <div className="p-6 rounded-2xl bg-black/10 border-l-4 border-indigo-500 text-sm italic opacity-80 leading-relaxed whitespace-pre-wrap">{h.interpretation}</div>}
                                        </div>
                                    ))}</div>
                                )}
                            </div>
                        )}
                        {activeTab === 'guide' && (
                            <div className="animate-fade-up space-y-10 py-10 pb-20">
                                <h3 className="text-xl font-serif font-bold opacity-50 uppercase tracking-widest">宇宙系統管理</h3>
                                <button onClick={() => {
                                    const p = prompt("請輸入管理密碼進入設定：");
                                    if (p === "5566") setAdminOpen(true); else alert("密碼錯誤。");
                                }} className="w-full py-4 glass rounded-[1.5rem] text-[11px] font-bold opacity-30 hover:opacity-100 uppercase transition-all">核心金鑰配置</button>
                                {isAdminOpen && (
                                    <div className="p-8 rounded-[2.5rem] space-y-6 animate-fade-up border border-white/20 bg-slate-900">
                                        <input type="password" placeholder="OpenAI Key (sk-...)" value={masterApiKey} onChange={e => setMasterApiKey(e.target.value)} className="w-full border rounded-2xl px-4 py-5 text-center bg-black/20 text-white" />
                                        <input type="text" placeholder="設定訪問密碼" value={masterPass} onChange={e => setMasterPass(e.target.value)} className="w-full border rounded-2xl px-4 py-5 text-center bg-black/20 text-white" />
                                        <div className="flex gap-2">
                                            <button onClick={() => {localStorage.setItem('arcanum_master_key', masterApiKey); localStorage.setItem('arcanum_master_pass', masterPass); showMsg("儲存成功", "success")}} className="flex-1 py-5 bg-indigo-600 text-white rounded-2xl font-bold btn-active">儲存設定</button>
                                            <button onClick={() => {
                                                const authCode = btoa(encodeURIComponent(`${masterApiKey}|${masterPass}`));
                                                const link = `${window.location.origin}${window.location.pathname}?auth=${authCode}`;
                                                const el = document.createElement("textarea"); el.value = link; document.body.appendChild(el); el.select();
                                                document.execCommand('copy'); document.body.removeChild(el); showMsg("授權邀請連結已複製！", "success");
                                            }} className="flex-1 py-5 bg-emerald-600 text-white rounded-2xl font-bold btn-active">產生邀請連結</button>
                                        </div>
                                        <button onClick={() => {localStorage.removeItem('tarot_history'); setHistory([]); showMsg("已清空紀錄", "success")}} className="w-full text-rose-500 text-xs opacity-50">清空歷史紀錄</button>
                                        <button onClick={() => setAdminOpen(false)} className="w-full text-white/30 text-xs">關閉設定</button>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                    <nav className="fixed bottom-0 left-0 w-full glass border-t border-white/10 py-6 px-10 flex justify-around items-center z-50">
                        {[{ id: 'divination', label: '占卜', icon: 'Sparkles' }, { id: 'history', label: '紀錄', icon: 'History' }, { id: 'guide', label: '管理', icon: 'Shield' }].map(tab => (
                            <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex flex-col items-center gap-1.5 transition-all ${activeTab === tab.id ? 'opacity-100 scale-110' : 'opacity-25'}`} style={{ color: activeTab === tab.id ? themeStyles.accent : 'currentColor' }}><Icon name={tab.icon} size={24} /><span className="text-[10px] font-bold uppercase">{tab.label}</span></button>
                        ))}
                    </nav>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
